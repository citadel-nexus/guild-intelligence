version: '3.8'
services:
  guild-intelligence:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NATS_URL=nats://nats:4222
      - GUILD_PORT=8000
      - GUILD_NAME=intelligence
    depends_on:
      - nats
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
